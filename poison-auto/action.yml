name: "Poison The auto Keyword"

inputs:
  configure_preset:
    description: 'The name of the CMake configure preset'
    required: true

runs:
  using: "composite"
  steps:
    - name: "Resolve Build Directory"
      id: build-dir
      shell: bash
      run: |
        # Extract the dir from the preset environment
        # We search for the specific variable name and clean the output
        dir=$(cmake --preset ${{ inputs.configure_preset }} -N | grep "MICROSTRAIN_BINARY_DIR" | cut -d'=' -f2- | xargs)

        if [[ -z "$dir" ]]; then
          echo "Warning: MICROSTRAIN_BINARY_DIR not found. Defaulting to 'build'"
          dir="build"
        fi

        echo "Detected Build Directory: $dir"
        echo "dir=$dir" >> $GITHUB_OUTPUT

        # Seed the File API Query before configuration
        mkdir -p "$dir/.cmake/api/v1/query"
        echo '{"requests":[{"kind":"codemodel","version":2}]}' > "$dir/.cmake/api/v1/query/codemodel-v2"

    - name: "Configure The Project"
      uses: HBK-MicroStrain-Internal/actions/cmake-configure@main
      with:
        preset_name: "${{ inputs.configure_preset }}"

    - name: "Inject Auto Redefinition"
      shell: bash
      run: |
        # Locate the reply file generated by CMake
        reply_dir="${{ steps.build-dir.outputs.dir }}/.cmake/api/v1/reply"
        main_code_model=$(ls $reply_dir/codemodel-v2-*.json | head -n 1)

        # Get Absolute Source Root from CMake metadata
        src_root=$(perl -0777 -ne 'if (/"paths"\s*:\s*\{.*?"source"\s*:\s*"([^"]+)"/s) { print $1; exit }' "$main_code_model")

        # Find all target JSON files (which contain the actual source lists)
        target_jsons=$(grep -oE '"jsonFile"\s*:\s*"target-[^"]+"' "$main_code_model" | cut -d'"' -f4)

        if [[ ! -f "$main_code_model" ]]; then
          echo "Error: CMake File API reply model not found at ${{ steps.build-dir.outputs.dir }}"
          exit 1
        fi

        define_auto=$'#pragma push_macro("auto")\n#define auto ((void)0)'
        undefine_auto="#pragma pop_macro(\"auto\")"

        # Get all of the file paths
        all_paths=""
        for target_json in $target_jsons; do
          matches=$(grep -oE '"path"\s*:\s*"[^"]+\.(cpp|c|h|hpp|cc|cxx|inl)"' "$reply_dir/$target_json" | cut -d'"' -f4 | sort -u || true)
          all_paths="$all_paths $matches"
        done

        # Remove precompiled headers and get unique files
        # Also remove dependencies
        files=$(echo "$all_paths" | tr ' ' '\n' | grep -ivE "((pch|stdafx)\.(h|hpp|cpp)$|(_deps|deps|Libraries)/)" | sort -u)

        for relative_path in $files; do
          # Construct full path to the file (CMake paths in target JSONs are relative to src_root)
          file="$src_root/$relative_path"

          if [[ -f "$file" ]]; then
            # Check if the file already has the definition to avoid infinite growth/nesting
            if grep -Fq "$define_auto" "$file" 2>/dev/null; then
              continue
            fi

            # Find the line number of the last #include
            last_include=$(grep -nE "^\s*#\s*include" "$file" | tail -n 1 | cut -d: -f1 || true)

            if [[ -n "$last_include" ]]; then
              # Look ahead for trailing #endif directives
              # We start searching from the line after the last include
              insert_line=$last_include
              total_lines=$(wc -l < "$file")

              current_line=$((last_include + 1))

              while [[ $current_line -le $total_lines ]]; do
                # Extract the content of the current line, trimming whitespace
                line_content=$(sed -n "${current_line}p" "$file" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

                # Empty line or a comment
                if [[ -z "$line_content" || "$line_content" == "\/\/"* ]]; then
                  current_line=$((current_line + 1))
                  continue
                # Found a closing directive
                elif [[ "$line_content" == "#endif"* ]]; then
                  insert_line=$current_line
                  current_line=$((current_line + 1))
                # Done parsing the file "header" section
                else
                  break
                fi
              done

              # Inject after the last insertion point
              sed -i "${insert_line}r /dev/stdin" "$file" <<< "$define_auto"

              # Find the last line in the file to check for ifdef include guards
              last_line_num=$(grep -nE '[^[:space:]]' "$file" | tail -n 1 | cut -d: -f1 || true)

              if [[ -n "$last_line_num" ]]; then
                # Get the content on the last line
                last_line_content=$(sed -n "${last_line_num}p" "$file" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

                if [[ "$last_line_content" == "#endif"* ]]; then
                  # It's a header guard. Insert the pop BEFORE the final #endif
                  # We use 'i' for insert (above the line)
                  sed -i "${last_line_num}i $undefine_auto" "$file"
                else
                  # No guard detected at the end. Just append to the bottom.
                  echo -e "\n$undefine_auto" >> "$file"
                fi
              fi
            else
              # No includes found. Inject at the very top
              sed -i "0r /dev/stdin" "$file" <<< "$define_auto"

              # Append Undef to the end of the file to prevent leakage
              echo -e "\n$undefine_auto" >> "$file"
            fi

            echo "Poisoned: $file"
          fi
        done
